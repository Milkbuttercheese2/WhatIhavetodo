<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 배경: 포스트잇 노란색 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#FFC93C"/>

  <!-- 살짝 기울어진 메모지 (배경과 대비되도록 흰색 계열) -->
  <g transform="rotate(-7 256 266)">
    <!-- 접힌 모서리 그림자 -->
    <rect x="124" y="130" width="266" height="266" rx="26" fill="#00000022"/>
    <!-- 메모지 본체 -->
    <rect x="118" y="122" width="266" height="266" rx="26" fill="#fffdf7"/>
    <!-- 접힌 모서리 (우하단) -->
    <path d="M 384 316 L 384 388 L 312 388 Z" fill="#f0e9d2"/>
    <path d="M 384 316 L 312 388 L 312 316 Z" fill="#fffdf7"/>
  </g>

  <!-- 굵은 체크마크 -->
  <path d="M 176 268 L 232 328 L 348 196"
        fill="none" stroke="#1b2430" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 알림 배지 (전화받고 잊어버리기 전에 = 놓치지 않는다는 강조) -->
  <circle cx="388" cy="120" r="46" fill="#FFC93C"/>
  <circle cx="388" cy="120" r="38" fill="#C0271C"/>
  <circle cx="388" cy="120" r="9" fill="#fffdf7"/>
</svg>
