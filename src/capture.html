<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>빠른 메모</title>
<!-- 미니 캡처 창 전용 페이지. 메인 앱 모듈 그래프와 완전히 독립 —
     store.js 등을 끌어오면 이 웹뷰에서도 최상위 부작용이 실행된다.
     외부(인터넷) 리소스 금지: 내부망(air-gapped) 배포 대상.
     v2.4.0: 메모 모드(기본) + Alt로 내 업무 검색 모드 전환.
     스타일: 애플 스포트라이트풍 플로팅 바 — 창은 transparent(tauri.conf) +
     둥근 패널(#cap-shell). v2.4.0에서 그림자 효과 제거. -->
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:transparent}
 body{display:flex;box-sizing:border-box;padding:0;
   font-family:system-ui,-apple-system,'Segoe UI','Malgun Gothic',sans-serif}
 /* 세련된 스포트라이트 바 — 그림자 없이 은은한 그라데이션+상단 하이라이트 테두리 */
 #cap-shell{flex:1;display:flex;flex-direction:column;min-height:0;
   background:linear-gradient(180deg,#3a3e4b 0%,#2b2e37 100%);
   border:1px solid rgba(255,255,255,.14);border-top-color:rgba(255,255,255,.22);
   border-radius:18px;overflow:hidden}
 #cap-bar{display:flex;align-items:center;flex:1;min-height:58px}
 body.search #cap-bar{flex:none}
 #cap-inp,#cap-search{flex:1;border:0;outline:0;background:transparent;color:#f4f6fb;
   font:16.5px/1.5 inherit;padding:16px 20px;letter-spacing:.01em}
 #cap-inp{resize:none}
 #cap-inp::placeholder,#cap-search::placeholder{color:#98a1b3}
 #cap-results{display:none;flex:1;min-height:0;flex-direction:column;
   border-top:1px solid rgba(255,255,255,.08)}
 .cap-col{flex:1;display:flex;flex-direction:column;min-width:0}
 .cap-col-h{flex:none;font:600 11px inherit;color:#8b95a7;
   padding:10px 18px 6px;letter-spacing:.06em;text-transform:uppercase}
 .cap-list{flex:1;overflow-y:auto;padding:0 10px 12px}
 .cap-list::-webkit-scrollbar{width:8px}
 .cap-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}
 .cap-hit{font:13.5px/1.45 inherit;color:#eef1f7;padding:8px 12px;margin:1px 0;
   border-radius:9px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .cap-hit:hover{background:linear-gradient(90deg,#4d63a8,#3d5391)}
 .cap-hit.done{color:#8b95a7;text-decoration:line-through}
 .cap-empty{font:12.5px inherit;color:#8b95a7;padding:12px}
 #cap-hint{flex:none;font:11px inherit;color:#727d91;
   padding:2px 18px 10px;display:none}
 body.search #cap-hint{display:block}
 #cap-flash{display:none;align-items:center;justify-content:center;flex:1;gap:7px;
   color:#84e592;font:600 16px inherit}
 body.flash #cap-bar,body.flash #cap-results,body.flash #cap-hint{display:none}
 body.flash #cap-flash{display:flex}
</style>
</head>
<body>
<div id="cap-shell">
  <div id="cap-bar">
    <textarea id="cap-inp" placeholder="빠른 메모 — Ctrl+Enter 등록 · Esc 닫기(내용 유지) · Alt 검색"></textarea>
    <input id="cap-search" placeholder="빠른 검색 — 업무·파일 · Alt로 메모 복귀" style="display:none" autocomplete="off">
  </div>
  <div id="cap-results">
    <div class="cap-col"><div class="cap-col-h">내 업무</div><div class="cap-list" id="cap-items"></div></div>
  </div>
  <div id="cap-hint">업무 클릭 = 메인 창에서 열기</div>
  <div id="cap-flash">등록됨</div>
</div>
<script type="module" src="capture-boot.js"></script>
</body>
</html>
