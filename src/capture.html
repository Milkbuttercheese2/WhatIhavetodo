<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>빠른 메모</title>
<!-- 미니 캡처 창 전용 페이지. 메인 앱 모듈 그래프와 완전히 독립 —
     store.js 등을 끌어오면 이 웹뷰에서도 최상위 부작용이 실행된다.
     외부(인터넷) 리소스 금지: 내부망(air-gapped) 배포 대상.
     v3.1.0: 메모 모드(기본) + Alt로 검색 모드(왼쪽 업무 | 오른쪽 파일) 전환.
     스타일: 애플 스포트라이트풍 플로팅 바 — 창은 transparent(tauri.conf) +
     둥근 패널(#cap-shell)에 그림자. 바깥 여백은 그림자 공간. -->
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:transparent}
 body{display:flex;box-sizing:border-box;padding:12px}
 #cap-shell{flex:1;display:flex;flex-direction:column;min-height:0;
   background:rgba(40,43,52,.96);border:1px solid rgba(255,255,255,.10);
   border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.5),0 2px 10px rgba(0,0,0,.35);
   overflow:hidden}
 #cap-bar{display:flex;align-items:stretch;flex:1;min-height:58px}
 body.search #cap-bar{flex:none}
 #cap-inp,#cap-search{flex:1;border:0;outline:0;background:transparent;color:#f2f5fa;
   font:17px/1.5 system-ui,'Malgun Gothic',sans-serif;padding:14px 16px}
 #cap-inp{resize:none}
 #cap-inp::placeholder,#cap-search::placeholder{color:#8b95a7}
 #cap-results{display:none;flex:1;gap:1px;background:rgba(255,255,255,.08);
   border-top:1px solid rgba(255,255,255,.08);min-height:0}
 .cap-col{flex:1;display:flex;flex-direction:column;background:rgba(40,43,52,.98);min-width:0}
 .cap-col-h{flex:none;font:600 11.5px system-ui,'Malgun Gothic',sans-serif;color:#8b95a7;
   padding:9px 14px 5px;letter-spacing:.03em}
 .cap-list{flex:1;overflow-y:auto;padding:0 8px 10px}
 .cap-list::-webkit-scrollbar{width:8px}
 .cap-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}
 .cap-hit{font:13.5px/1.45 system-ui,'Malgun Gothic',sans-serif;color:#f2f5fa;padding:7px 10px;
   border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .cap-hit:hover{background:#3d63c9}
 .cap-hit.done{color:#8b95a7;text-decoration:line-through}
 .cap-empty{font:12.5px system-ui,'Malgun Gothic',sans-serif;color:#8b95a7;padding:10px}
 #cap-hint{flex:none;font:11px system-ui,'Malgun Gothic',sans-serif;color:#6b7689;
   padding:0 16px 8px;display:none}
 body.search #cap-hint{display:block}
 #cap-flash{display:none;align-items:center;justify-content:center;flex:1;
   color:#7ee08a;font:600 16px system-ui,'Malgun Gothic',sans-serif}
 body.flash #cap-bar,body.flash #cap-results,body.flash #cap-hint{display:none}
 body.flash #cap-flash{display:flex}
</style>
</head>
<body>
<div id="cap-shell">
  <div id="cap-bar">
    <textarea id="cap-inp" placeholder="빠른 메모 — Ctrl+Enter 등록 · Esc 닫기(내용 유지) · Alt 검색"></textarea>
    <input id="cap-search" placeholder="빠른 검색 — 업무·파일 · Alt로 메모 복귀" style="display:none" autocomplete="off">
  </div>
  <div id="cap-results">
    <div class="cap-col"><div class="cap-col-h">내 업무</div><div class="cap-list" id="cap-items"></div></div>
    <div class="cap-col"><div class="cap-col-h">파일 (Everything)</div><div class="cap-list" id="cap-files"></div></div>
  </div>
  <div id="cap-hint">업무 클릭 = 메인 창에서 열기 · 파일 클릭 = 바로 열기</div>
  <div id="cap-flash">등록됨</div>
</div>
<script type="module" src="capture-boot.js"></script>
</body>
</html>
