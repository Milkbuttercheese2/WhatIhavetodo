<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>빠른 메모</title>
<!-- 미니 캡처 창 전용 페이지. 메인 앱 모듈 그래프와 완전히 독립 —
     store.js 등을 끌어오면 이 웹뷰에서도 최상위 부작용이 실행된다.
     외부(인터넷) 리소스 금지: 내부망(air-gapped) 배포 대상.
     v2.4.0: 메모 모드(기본) + Alt로 내 업무 검색 모드 전환.
     스타일: 창은 transparent(tauri.conf) + 둥근 검정 패널(스포트라이트풍, 그림자 없음).
     폰트는 앱과 통일(Pretendard/맑은 고딕), 글씨크기는 입력·검색·검색결과 모두 14px. -->
<style>
 /* 검정 계열 스포트라이트 바 (그림자 없음). 폰트는 앱과 통일(Pretendard 로컬 번들). */
 @font-face{font-family:'Pretendard';src:url('fonts/PretendardVariable.woff2') format('woff2-variations');
   font-weight:45 920;font-style:normal;font-display:swap}
 html,body{margin:0;height:100%;overflow:hidden;background:transparent}
 body{display:flex;box-sizing:border-box;padding:0;color:#f2f5fa;
   font-family:'Pretendard','Malgun Gothic','맑은 고딕',system-ui,-apple-system,sans-serif}
 #cap-shell{flex:1;display:flex;flex-direction:column;min-height:0;
   background:#1e2128;border:1px solid #2c313b;border-radius:18px;overflow:hidden}
 #cap-bar{display:flex;align-items:center;flex:1;min-height:56px}
 body.search #cap-bar{flex:none}
 /* v2.5.1: font 축약형에 inherit(전역 키워드)를 섞으면 선언 전체가 무효 처리돼
    입력창이 브라우저 기본 폼 폰트로 렌더되던 버그 — 롱핸드로 분리(파일 전체 동일). */
 #cap-inp,#cap-search{flex:1;border:0;outline:0;background:transparent;color:#f2f5fa;
   font-family:inherit;font-size:14px;line-height:1.5;padding:15px 18px}
 /* v2.5.11: 한 줄 기본(rows=1) + box-sizing 으로 auto-grow 정확히. 기본 textarea rows=2 라
    한 줄 메모가 2줄 박스 위쪽에 붙어 "글자가 위로 뜬" 것처럼 보이던 문제 해결. */
 #cap-inp{resize:none;box-sizing:border-box;overflow:hidden}
 #cap-inp::placeholder,#cap-search::placeholder{color:#8b95a7}
 #cap-results{display:none;flex:1;min-height:0;flex-direction:column;
   border-top:1px solid rgba(255,255,255,.08)}
 .cap-col{flex:1;display:flex;flex-direction:column;min-width:0}
 .cap-col-h{flex:none;font-weight:600;font-size:11px;color:#8b95a7;
   padding:10px 16px 6px;letter-spacing:.04em}
 .cap-list{flex:1;overflow-y:auto;padding:0 8px 10px}
 /* v2.5.3 스크롤바 — 검정 패널에 맞춘 유리 썸(트랙 없음·둥근 캡슐), 안 쓸 때 숨김.
    메모 입력칸(textarea)·검색 목록 모두 동일 적용 (창 전역 규칙). */
 ::-webkit-scrollbar{width:9px;height:9px}
 ::-webkit-scrollbar-track{background:transparent}
 ::-webkit-scrollbar-corner{background:transparent}
 ::-webkit-scrollbar-thumb{background:transparent;border-radius:999px;border:2px solid transparent;background-clip:padding-box}
 :hover::-webkit-scrollbar-thumb,:focus-within::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
 ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.32);border-radius:999px;border:2px solid transparent;background-clip:padding-box}
 .cap-hit{font-size:13px;line-height:1.45;color:#eef1f7;padding:8px 11px;margin:1px 0;
   border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .cap-hit:hover{background:#173f3a;color:#4fe0c8}
 .cap-hit.done{color:#8b95a7}
 .cap-empty{font-size:12.5px;color:#8b95a7;padding:12px}
 #cap-hint{flex:none;font-size:11px;color:#727d91;padding:2px 16px 10px;display:none}
 body.search #cap-hint{display:none}
 #cap-flash{display:none;align-items:center;justify-content:center;flex:1;gap:7px;
   color:#3dd7bf;font-weight:600;font-size:15px}
 body.flash #cap-bar,body.flash #cap-results,body.flash #cap-hint{display:none}
 body.flash #cap-flash{display:flex}
 .cap-col-h{display:none}
 .cap-hit{display:flex;align-items:center;gap:9px}
 .cap-hit-txt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .cap-tag{flex:none;font-weight:700;font-size:10.5px;padding:2.5px 9px;border-radius:999px;letter-spacing:.02em}
 .cap-tag.ongoing{background:#153f39;color:#54e2ca}
 .cap-tag.done{background:#2b3039;color:#8b95a7}
 .cap-hit.done .cap-hit-txt{color:#8b95a7}
</style>
</head>
<body>
<div id="cap-shell">
  <div id="cap-bar">
    <textarea id="cap-inp" rows="1" maxlength="50000" placeholder="빠른 메모 · Alt 검색"></textarea>
    <input id="cap-search" placeholder="검색" style="display:none" autocomplete="off">
  </div>
  <div id="cap-results">
    <div class="cap-col"><div class="cap-col-h">내 업무</div><div class="cap-list" id="cap-items"></div></div>
  </div>
  <div id="cap-hint">업무 클릭 = 메인 창에서 열기</div>
  <div id="cap-flash">등록됨</div>
</div>
<script type="module" src="capture-boot.js"></script>
</body>
</html>
